name: build-hoc-canary
# Builda a NOSSA imagem do canary (fork HOC) e publica em ghcr.io/augustozanchet/canary.
# Roda nos runners do GitHub (nao toca no servidor de producao).
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'
      - 'vcpkg.json'
      - 'CMakeLists.txt'
      - 'docker/Dockerfile.x86'
      - '.github/workflows/build-hoc-canary.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Liberar disco no runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/lib/node_modules || true
          sudo docker image prune -af || true
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push da nossa imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.x86
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            VCPKG_FEED_URL=https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            VCPKG_FEED_USERNAME=${{ github.repository_owner }}
            VCPKG_BINARY_CACHE_MODE=read
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
